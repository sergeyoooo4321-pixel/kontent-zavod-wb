name: ask_user_choice
description: |
  Спросить у юзера выбор из нескольких вариантов (top-3 категории, top-3 значения
  атрибута, и т.п.) когда автомат не уверен. Скилл формирует структурированный
  текст с пронумерованными опциями и confidence-процентами; помечен
  requires_approval, чтобы тебя остановили после вызова.

  Используй когда:
  - LLM не уверена в категории (топ-1 confidence < 0.85 или нет большого gap)
  - значение из словаря было подменено через Левенштейна (substituted)
  - required-поле не заполнилось и есть несколько разумных вариантов

  После вызова покажи `text` юзеру БЕЗ изменений (он уже отформатирован) и
  ничего не делай дальше. Юзер ответит цифрой («1», «2», «3» или «другое»),
  и ты в следующем шаге продолжишь работу зная выбор.

  Не используй для бинарных «да/нет» — для них достаточно обычного
  approval-flow на скилле с requires_approval=true.
version: 0.1.0
input_schema:
  type: object
  properties:
    title:
      type: string
      description: |
        Заголовок вопроса (одна короткая фраза). Например: «Какая категория Ozon
        для Tide Стиральный порошок 400 г?»
    options:
      type: array
      description: |
        Варианты выбора. Каждый — объект {label, detail?, score?, id?}.
        Будут пронумерованы 1..N. К списку автоматически добавится опция
        «Другое».
      items:
        type: object
        properties:
          label:
            type: string
            description: Короткое название варианта.
          detail:
            type: string
            description: Дополнительное пояснение (1 строка). Опционально.
          score:
            type: number
            description: Confidence от 0 до 1. Опционально — будет показано как процент.
          id:
            type: [string, integer]
            description: Внутренний идентификатор (например, wb_subject_id). Не показывается юзеру.
    allow_freetext:
      type: boolean
      default: true
      description: Добавлять ли последний пункт «Другое (введи свой вариант)».
  required: [title, options]
permissions: []
requires_approval: true
