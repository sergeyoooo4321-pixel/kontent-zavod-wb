name: generate_image
description: |
  Сгенерировать 4 варианта фотографии товара (main, pack2, pack3, extra) через
  kie.ai gpt-image-2 на основе исходного фото юзера и брифа от LLM.
  Возвращает публичные URL картинок в S3. После вызова обязательно покажи
  результат юзеру и попроси одобрения — у скилла стоит requires_approval.
version: 0.1.0
input_schema:
  type: object
  properties:
    src_url:
      type: string
      description: Публичный URL исходной фотки от юзера (загружена ботом в S3)
    brand:
      type: string
      description: Бренд товара (например, Tide)
    name:
      type: string
      description: Название товара
    sku:
      type: string
      description: Артикул (опционально, для tagging в S3)
  required: [src_url, brand, name]
permissions: []
requires_approval: true
