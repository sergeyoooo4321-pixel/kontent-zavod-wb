name: fill_excel_batch
description: |
  Заполнить xlsx-шаблон Ozon/WB партией товаров по правилам §5.2 ТЗ:
  каждый товар разворачивается в 3 SKU (одиночка, x2, x3), считаются
  габариты/веса/имена/НДС/состав/ТНВЭД-маркеры, картинки.

  Двухфазный flow:
    1. Первый вызов с answers={} — заполняет всё детерминированно. На required-
       полях которые не маппятся автоматом возвращает state="pending" и список
       вопросов. Для каждого вопроса вызови ask_user_choice, собери ответы.
    2. Второй вызов с накопленным answers — применяет ответы, пишет xlsx,
       возвращает state="filled" + xlsx_path.

  template_json_path — это файл из parse_template (~/cz-backend/templates/
  <cabinet>/<mp>_<имя>.json). Сам xlsx-оригинал должен лежать там же где был
  на момент parse (его путь сохранён в TemplateSpec.raw_path).
version: 0.1.0
input_schema:
  type: object
  properties:
    template_json_path:
      type: string
      description: Путь к распарсенному JSON-шаблону (от parse_template).
    products:
      type: array
      description: Товары партии. Каждый — {sku, name, brand, weight_g?, dims?, images?}.
      items:
        type: object
        properties:
          sku: { type: string }
          name: { type: string }
          brand: { type: string }
          weight_g:
            type: integer
            description: Вес одиночной единицы в граммах.
          dims:
            type: object
            description: "Габариты в см: {l,w,h}"
          images:
            type: object
            description: "Tag → URL: {main, pack2, pack3, extra}"
        required: [sku, name]
    cabinet:
      type: string
      description: Имя кабинета — папка для сохранения filled xlsx. По умолчанию "default".
    answers:
      type: object
      description: |
        Накопленные ответы юзера: {field_id: answer}. На первом вызове передавай {}.
        После ask_user_choice добавляй сюда {field_id (из pending): answer (текст)}.
    output_filename:
      type: string
      description: Имя выходного xlsx (с расширением). По умолчанию <шаблон>_filled.xlsx.
  required: [template_json_path, products]
permissions: []
requires_approval: false
