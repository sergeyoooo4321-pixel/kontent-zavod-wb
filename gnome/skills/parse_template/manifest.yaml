name: parse_template
description: |
  Распарсить xlsx-шаблон Ozon или Wildberries: вытащить структуру полей,
  обязательные, выпадающие списки, category_id (для Ozon). Сохраняет результат
  в JSON в ~/cz-backend/templates/<cabinet>/<ozon|wb>_<имя>.json. Этот JSON потом
  используется скиллом fill_excel_batch для заполнения партии.

  На вход — абсолютный путь к xlsx-файлу на сервере. Файл должен быть уже залит
  (через TG-документ → ~/cz-backend/uploads/).

  Авто-детект формата: Ozon (листы Шаблон+validation) или Wildberries (Товары+
  Инструкция). Парсер устойчив к шаблонам с битой DataValidation — открывает
  через read_only fallback.
version: 0.1.0
input_schema:
  type: object
  properties:
    xlsx_path:
      type: string
      description: Абсолютный путь к xlsx-файлу на сервере (например /home/albert/cz-backend/uploads/profit/template.xlsx).
    cabinet:
      type: string
      description: Имя кабинета — папка для сохранения JSON. По умолчанию "default".
    save_as:
      type: string
      description: Имя файла JSON без расширения. По умолчанию — имя xlsx без расширения.
  required: [xlsx_path]
permissions: []
requires_approval: false
