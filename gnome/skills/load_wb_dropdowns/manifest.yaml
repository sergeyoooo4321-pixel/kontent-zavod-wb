name: load_wb_dropdowns
description: |
  Подгрузить значения выпадающих списков для полей WB-шаблона. WB в xlsx
  хранит только charcID/charcType через defined_names, сами значения нужно
  тянуть через WB Content API (subject_charcs + directory_values).

  Используй сразу после parse_template если шаблон WB. После этого скилла
  все поля с wb_charc_type 4 (одиночный словарь) или 5 (мультивыбор) получат
  заполненный TemplateField.dropdown.

  Для Ozon-шаблонов вызов не нужен — там значения уже на листе validation.

  Если у текущего кабинета не настроен WB_TOKEN — скилл вернёт ошибку
  «WBClient не инициализирован».
version: 0.1.0
input_schema:
  type: object
  properties:
    template_json_path:
      type: string
      description: Путь к JSON от parse_template.
    cabinet:
      type: string
      description: Имя WB-кабинета (зарезервировано на multi-cabinet).
  required: [template_json_path]
permissions: []
requires_approval: false
