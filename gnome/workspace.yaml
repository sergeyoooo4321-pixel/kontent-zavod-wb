# Профиль воркспейса гнома. Загружается на старте сервиса.
# Идея взята у openclaw — workspace = личное пространство агента
# с его памятью, скиллами и настройками.

name: kontent-zavod-gnome
owner: продавец-сеточник на маркетплейсах WB/Ozon
purpose: |
  Помощник внутри Telegram-бота «Контент-завод».
  Под управлением гнома — генерация фото товара (aitunnel gpt-image-2),
  подбор категории, сборка партии в ZIP с готовыми xlsx-шаблонами.
  Юзер сам грузит ZIP в кабинеты МП — без API-заливки.

# Дефолтная LLM. Можно переопределить через env LLM_MODEL.
default_model: gemini-3.1-pro-preview
fallback_model: claude-sonnet-4.6
image_model: gpt-image-2

# Провайдер AI: aitunnel.ru (OpenAI-совместимый агрегатор).
ai_provider:
  name: aitunnel.ru
  base_url: https://api.aitunnel.ru/v1
  api_key_env: AITUNNEL_API_KEY

# Whitelisted скиллы
allowed_skills:
  - make_batch_zip          # главный — собирает ZIP и шлёт юзеру
  - parse_template          # вызывается bridge'м когда юзер кидает xlsx
  - fill_excel_batch        # внутренний, дёргается из make_batch_zip
  - load_wb_dropdowns       # внутренний, для WB-шаблонов
  - deliver_excel           # ручная отправка xlsx (опционально)
  - ask_user_choice         # confidence-based вопрос юзеру

# Backend cz-backend.service на :8000 — тот же сервер.
# Гном дёргает internal API оттуда (aitunnel-клиент, S3, WB, Ozon
# уже подняты в нём).
backend:
  url: http://127.0.0.1:8000
  internal_token_env: INTERNAL_TOKEN  # читаем из env

# Файлы которые читаются в системный промпт при первом запросе сессии.
# Порядок важен: BOOTSTRAP — самое первое, дальше идентичность, дальше детали.
bootstrap:
  - BOOTSTRAP.md
  - CLAUDE.md
  - memory/identity.md
  - memory/about_marketplaces.md
